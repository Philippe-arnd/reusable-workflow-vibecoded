name: Reusable Auto Merge

on:
  workflow_call:
    inputs:
      required-checks:
        description: 'Newline-separated list of check names that must all pass before merging'
        type: string
        required: true
      conditional-checks:
        description: 'Newline-separated list of check names that block merging only if they ran (skipped when check run is absent)'
        type: string
        default: ''
      merge-method:
        description: 'Merge method: squash, merge, or rebase'
        type: string
        default: 'squash'
      base-branch:
        description: 'Target branch — only PRs targeting this branch are auto-merged'
        type: string
        default: 'main'
      block-label:
        description: 'PRs with this label are skipped (require manual review)'
        type: string
        default: 'major-update'
      triggering-conclusion:
        description: 'Conclusion of the triggering workflow_run (passed from caller since workflow_call does not forward event payload)'
        type: string
        default: ''
      triggering-branch:
        description: 'Head branch of the triggering workflow_run (passed from caller since workflow_call does not forward event payload)'
        type: string
        default: ''

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  auto-merge:
    name: 🤖 Auto Merge
    runs-on: ubuntu-latest
    timeout-minutes: 12
    # Only run when the triggering workflow succeeded.
    # inputs.triggering-conclusion is forwarded by the caller because workflow_call
    # does not propagate the parent workflow_run event payload.
    if: ${{ inputs.triggering-conclusion == 'success' }}
    steps:
      - name: 🔍 Find associated PR and check eligibility
        id: find-pr
        uses: actions/github-script@v8
        with:
          script: |
            const branch = '${{ inputs.triggering-branch }}';
            const baseBranch = '${{ inputs.base-branch }}';
            const blockLabel = '${{ inputs.block-label }}';

            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${branch}`,
            });

            const pr = prs.find(p => p.base.ref === baseBranch);
            if (!pr) {
              console.log(`No open PR found for branch ${branch} targeting ${baseBranch}`);
              core.setOutput('pr_number', '');
              return;
            }

            console.log(`Found PR #${pr.number}: ${pr.title}`);

            if (pr.draft) {
              console.log('PR is draft — skipping');
              core.setOutput('pr_number', '');
              return;
            }

            if (pr.mergeable === false || pr.mergeable_state === 'dirty') {
              console.log('PR has conflicts — skipping');
              core.setOutput('pr_number', '');
              return;
            }

            const hasBlockLabel = (pr.labels || []).some(l => l.name === blockLabel);
            if (hasBlockLabel) {
              console.log(`PR has '${blockLabel}' label — requires manual review`);
              core.setOutput('pr_number', '');
              return;
            }

            core.setOutput('pr_number', String(pr.number));

      - name: ✅ Verify all required checks passed
        id: check-status
        if: steps.find-pr.outputs.pr_number != ''
        uses: actions/github-script@v8
        with:
          script: |
            const prNumber = parseInt('${{ steps.find-pr.outputs.pr_number }}');
            const requiredChecks = `${{ inputs.required-checks }}`
              .split('\n')
              .map(s => s.trim())
              .filter(Boolean);

            const conditionalChecks = `${{ inputs.conditional-checks }}`
              .split('\n')
              .map(s => s.trim())
              .filter(Boolean);

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const sha = pr.head.sha;
            const MAX_ATTEMPTS = 16;
            const POLL_INTERVAL_MS = 30_000;

            const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

            const getCheckMap = async () => {
              const { data: checks } = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: sha,
                per_page: 100,
              });
              const map = {};
              for (const run of checks.check_runs) {
                // Keep the most recent run for each check name
                if (!map[run.name] || run.id > map[run.name].id) {
                  map[run.name] = { id: run.id, status: run.status, conclusion: run.conclusion };
                }
              }
              return map;
            };

            let attempt = 0;
            while (attempt < MAX_ATTEMPTS) {
              attempt++;
              const checkMap = await getCheckMap();

              // Detect any required check that has already failed — no point waiting
              let failedEarly = false;
              for (const name of requiredChecks) {
                const c = checkMap[name];
                if (c && c.status === 'completed' && c.conclusion !== 'success') {
                  console.log(`❌ Required check '${name}' failed (${c.conclusion}) — aborting`);
                  failedEarly = true;
                }
              }
              if (failedEarly) {
                core.setOutput('ready', 'false');
                core.setOutput('pr_number', String(prNumber));
                return;
              }

              // Check if all required checks are completed
              const allRequired = requiredChecks.every(name => {
                const c = checkMap[name];
                return c && c.status === 'completed';
              });

              // Check if any conditional checks that exist are still pending
              const allConditional = conditionalChecks.every(name => {
                const c = checkMap[name];
                return !c || c.status === 'completed';
              });

              if (allRequired && allConditional) {
                // All checks are done — evaluate results
                let allPassed = true;

                for (const name of requiredChecks) {
                  const c = checkMap[name];
                  if (c.conclusion === 'success') {
                    console.log(`✅ ${name}: passed`);
                  } else {
                    console.log(`❌ Required check '${name}': ${c.conclusion}`);
                    allPassed = false;
                  }
                }

                for (const name of conditionalChecks) {
                  const c = checkMap[name];
                  if (!c) {
                    console.log(`⏭️ Conditional check '${name}': not found (did not run — skipping)`);
                  } else if (c.conclusion === 'success') {
                    console.log(`✅ ${name}: passed`);
                  } else {
                    console.log(`❌ Conditional check '${name}': ${c.conclusion} (ran but did not pass)`);
                    allPassed = false;
                  }
                }

                core.setOutput('ready', allPassed ? 'true' : 'false');
                core.setOutput('pr_number', String(prNumber));
                return;
              }

              // Some checks are still pending — log and wait
              const pending = [
                ...requiredChecks.filter(n => !checkMap[n] || checkMap[n].status !== 'completed'),
                ...conditionalChecks.filter(n => checkMap[n] && checkMap[n].status !== 'completed'),
              ];
              console.log(`⏳ Attempt ${attempt}/${MAX_ATTEMPTS}: waiting for: ${pending.join(', ')}`);

              if (attempt < MAX_ATTEMPTS) {
                await sleep(POLL_INTERVAL_MS);
              }
            }

            console.log('⏰ Timed out waiting for required checks to complete — skipping merge');
            core.setOutput('ready', 'false');
            core.setOutput('pr_number', String(prNumber));

      - name: 🔀 Merge PR
        id: merge
        if: steps.check-status.outputs.ready == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const prNumber = parseInt('${{ steps.check-status.outputs.pr_number }}');
            const method = '${{ inputs.merge-method }}';

            try {
              const result = await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                merge_method: method,
              });
              console.log(`✅ PR #${prNumber} merged (${method}). SHA: ${result.data.sha}`);

              await github.rest.issues.createComment({
                issue_number: prNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `🤖 All required CI checks passed. This PR has been automatically merged to \`${{ inputs.base-branch }}\` (${method}).`,
              });
            } catch (error) {
              console.error(`Failed to merge: ${error.message}`);

              await github.rest.issues.createComment({
                issue_number: prNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `⚠️ **Auto-merge attempted but failed**\n\nReason: ${error.message}\n\nPlease merge manually or check for conflicts.`,
              });

              throw error;
            }
