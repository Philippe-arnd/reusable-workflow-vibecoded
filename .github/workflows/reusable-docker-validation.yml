name: Reusable Docker Validation

on:
  workflow_call:
    inputs:
      use-compose:
        description: 'Use docker compose instead of single Dockerfile + docker run'
        type: boolean
        default: false

      # Single Dockerfile mode
      dockerfile-path:
        description: 'Path to Dockerfile (single mode only)'
        type: string
        default: 'Dockerfile'
      image-tag:
        description: 'Tag for the built image (single mode only)'
        type: string
        default: 'app:ci-test'
      build-args:
        description: 'Docker build args, one --build-arg KEY=VALUE per line (single mode only)'
        type: string
        default: ''
      app-port:
        description: 'Container port to map and health-check (single mode only)'
        type: number
        default: 3000
      health-endpoint:
        description: 'HTTP path to poll for health check'
        type: string
        default: '/api/health'
      health-retries:
        description: 'Number of health check attempts before failing'
        type: number
        default: 30
      health-interval-seconds:
        description: 'Seconds between health check attempts'
        type: number
        default: 3

      # postgres (single mode only — compose mode manages its own services via compose file)
      postgres-image:
        description: 'Postgres Docker image (single mode only)'
        type: string
        default: 'postgres:17-alpine'
      postgres-db:
        description: 'Test database name (single mode only)'
        type: string
        default: 'test_db'
      # Ephemeral CI credentials — created fresh per runner, never used in production.
      postgres-admin-password:
        description: 'Postgres superuser password (single mode only)'
        type: string
        default: 'postgres'
      app-user:
        description: 'Non-superuser to create for RLS (single mode only)'
        type: string
        default: 'app_user'
      # Ephemeral CI credentials — created fresh per runner, never used in production.
      app-password:
        description: 'Password for app_user (single mode only)'
        type: string
        default: 'app_password'

      # App env vars (single mode only — compose mode uses its own .env / compose file)
      app-env:
        description: 'Env vars for the app container, one KEY=VALUE per line (single mode only)'
        type: string
        default: ''

      # Docker Compose mode
      compose-env-content:
        description: 'Contents of the .env file to create before docker compose build/up (compose mode only), one KEY=VALUE per line'
        type: string
        default: ''
      compose-services-to-build:
        description: 'Space-separated list of services to build (compose mode only, empty = all)'
        type: string
        default: ''
      compose-health-service:
        description: 'Service name whose health to check (compose mode only)'
        type: string
        default: 'server'
      compose-health-port:
        description: 'Port inside the health service container to check (compose mode only)'
        type: number
        default: 3000

      # Trivy vulnerability scan
      run-trivy-scan:
        description: 'Scan the built image for OS and dependency vulnerabilities'
        type: boolean
        default: true
      trivy-severity:
        description: 'Severity levels to report, comma-separated (UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL)'
        type: string
        default: 'CRITICAL,HIGH'
      trivy-ignore-unfixed:
        description: 'Only report vulnerabilities that have a fix available (reduces noise from unactionable CVEs)'
        type: boolean
        default: true
      trivy-fail-on-finding:
        description: 'Fail the job when Trivy finds vulnerabilities at the configured severity'
        type: boolean
        default: false
      trivy-compose-image:
        description: 'Image name to scan in compose mode (e.g. myapp-server:latest). Empty = skip Trivy in compose mode.'
        type: string
        default: ''

jobs:
  docker-build-validate:
    name: 🐳 Build & Validate Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
      actions: write
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Single Dockerfile mode ──────────────────────────────────────────
      - name: 🏗️ Build Docker image (single mode)
        if: ${{ !inputs.use-compose }}
        run: |
          BUILD_ARGS=""
          if [ -n "${{ inputs.build-args }}" ]; then
            while IFS= read -r line; do
              [ -n "$line" ] && BUILD_ARGS="$BUILD_ARGS $line"
            done <<< "${{ inputs.build-args }}"
          fi
          docker build $BUILD_ARGS \
            --tag ${{ inputs.image-tag }} \
            --file ${{ inputs.dockerfile-path }} \
            .

      - name: 🔍 Scan image for vulnerabilities (single mode)
        if: ${{ !inputs.use-compose && inputs.run-trivy-scan }}
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ inputs.image-tag }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: ${{ inputs.trivy-severity }}
          ignore-unfixed: ${{ inputs.trivy-ignore-unfixed }}
          exit-code: ${{ inputs.trivy-fail-on-finding && '1' || '0' }}

      - name: 📤 Upload Trivy results to Security tab (single mode)
        if: ${{ !inputs.use-compose && inputs.run-trivy-scan && always() }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

      - name: 📋 Generate SBOM (single mode)
        if: ${{ !inputs.use-compose && inputs.run-trivy-scan }}
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ inputs.image-tag }}
          format: 'spdx-json'
          output: 'sbom.spdx.json'

      - name: 📤 Upload SBOM artifact (single mode)
        if: ${{ !inputs.use-compose && inputs.run-trivy-scan }}
        uses: actions/upload-artifact@v6
        with:
          name: sbom-spdx
          path: sbom.spdx.json
          retention-days: 90

      - name: 🌐 Create Docker network (single mode)
        if: ${{ !inputs.use-compose }}
        run: docker network create ci-test-net

      - name: 🛢️ Start PostgreSQL (single mode)
        if: ${{ !inputs.use-compose }}
        run: |
          docker run -d \
            --name ci-postgres \
            --network ci-test-net \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=${{ inputs.postgres-admin-password }} \
            -e POSTGRES_DB=${{ inputs.postgres-db }} \
            ${{ inputs.postgres-image }}

      - name: ⏳ Wait for PostgreSQL (single mode)
        if: ${{ !inputs.use-compose }}
        run: |
          until docker exec ci-postgres pg_isready -U postgres; do
            echo "Waiting for postgres..."
            sleep 2
          done

      - name: 👤 Create app_user (single mode)
        if: ${{ !inputs.use-compose }}
        run: |
          docker exec ci-postgres psql -U postgres -d ${{ inputs.postgres-db }} -c \
            "CREATE USER ${{ inputs.app-user }} WITH PASSWORD '${{ inputs.app-password }}';
             GRANT CONNECT ON DATABASE ${{ inputs.postgres-db }} TO ${{ inputs.app-user }};"

      - name: 🚀 Start application container (single mode)
        if: ${{ !inputs.use-compose }}
        run: |
          APP_ENV_ARGS=""
          if [ -n "${{ inputs.app-env }}" ]; then
            while IFS= read -r line; do
              [ -n "$line" ] && APP_ENV_ARGS="$APP_ENV_ARGS -e $line"
            done <<< "${{ inputs.app-env }}"
          fi
          docker run -d \
            --name ci-app \
            --network ci-test-net \
            -p ${{ inputs.app-port }} \
            -e DATABASE_URL=postgresql://${{ inputs.app-user }}:${{ inputs.app-password }}@ci-postgres:5432/${{ inputs.postgres-db }} \
            -e ADMIN_DATABASE_URL=postgresql://postgres:${{ inputs.postgres-admin-password }}@ci-postgres:5432/${{ inputs.postgres-db }} \
            $APP_ENV_ARGS \
            ${{ inputs.image-tag }}

      - name: 🔌 Get dynamic app port (single mode)
        if: ${{ !inputs.use-compose }}
        id: get-port
        run: |
          APP_PORT=$(docker port ci-app ${{ inputs.app-port }} | cut -d: -f2)
          echo "app_port=$APP_PORT" >> $GITHUB_OUTPUT

      - name: 🏥 Health check (single mode)
        if: ${{ !inputs.use-compose }}
        run: |
          PORT="${{ steps.get-port.outputs.app_port }}"
          for i in $(seq 1 ${{ inputs.health-retries }}); do
            if curl -sf "http://localhost:${PORT}${{ inputs.health-endpoint }}"; then
              echo "Application is healthy"
              exit 0
            fi
            echo "Attempt $i/${{ inputs.health-retries }}: waiting..."
            sleep ${{ inputs.health-interval-seconds }}
          done
          echo "Application failed to become healthy"
          docker logs ci-app
          exit 1

      - name: 🧹 Cleanup (single mode)
        if: ${{ !inputs.use-compose && always() }}
        run: |
          docker stop ci-app ci-postgres 2>/dev/null || true
          docker rm ci-app ci-postgres 2>/dev/null || true
          docker network rm ci-test-net 2>/dev/null || true

      # ── Docker Compose mode ─────────────────────────────────────────────
      - name: 📝 Create .env file (compose mode)
        if: ${{ inputs.use-compose && inputs.compose-env-content != '' }}
        env:
          ENV_CONTENT: ${{ inputs.compose-env-content }}
        run: printf '%s\n' "$ENV_CONTENT" > .env

      - name: 🏗️ Build images (compose mode)
        if: ${{ inputs.use-compose }}
        run: |
          if [ -n "${{ inputs.compose-services-to-build }}" ]; then
            docker compose build ${{ inputs.compose-services-to-build }}
          else
            docker compose build
          fi

      - name: 🔍 Scan image for vulnerabilities (compose mode)
        if: ${{ inputs.use-compose && inputs.run-trivy-scan && inputs.trivy-compose-image != '' }}
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ inputs.trivy-compose-image }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: ${{ inputs.trivy-severity }}
          ignore-unfixed: ${{ inputs.trivy-ignore-unfixed }}
          exit-code: ${{ inputs.trivy-fail-on-finding && '1' || '0' }}

      - name: 📤 Upload Trivy results to Security tab (compose mode)
        if: ${{ inputs.use-compose && inputs.run-trivy-scan && inputs.trivy-compose-image != '' && always() }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

      - name: 📋 Generate SBOM (compose mode)
        if: ${{ inputs.use-compose && inputs.run-trivy-scan && inputs.trivy-compose-image != '' }}
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ inputs.trivy-compose-image }}
          format: 'spdx-json'
          output: 'sbom.spdx.json'

      - name: 📤 Upload SBOM artifact (compose mode)
        if: ${{ inputs.use-compose && inputs.run-trivy-scan && inputs.trivy-compose-image != '' }}
        uses: actions/upload-artifact@v6
        with:
          name: sbom-spdx
          path: sbom.spdx.json
          retention-days: 90

      - name: 🚀 Start services (compose mode)
        if: ${{ inputs.use-compose }}
        run: docker compose up -d

      - name: 🏥 Health check (compose mode)
        if: ${{ inputs.use-compose }}
        run: |
          SERVICE="${{ inputs.compose-health-service }}"
          PORT="${{ inputs.compose-health-port }}"
          for i in $(seq 1 ${{ inputs.health-retries }}); do
            if docker compose exec -T "$SERVICE" \
                wget -q -O- "http://localhost:${PORT}${{ inputs.health-endpoint }}" 2>/dev/null; then
              echo "Service $SERVICE is healthy"
              exit 0
            fi
            echo "Attempt $i/${{ inputs.health-retries }}: waiting..."
            sleep ${{ inputs.health-interval-seconds }}
          done
          echo "Service $SERVICE failed to become healthy"
          docker compose logs
          exit 1

      - name: 🧹 Cleanup (compose mode)
        if: ${{ inputs.use-compose && always() }}
        run: docker compose down -v --remove-orphans
