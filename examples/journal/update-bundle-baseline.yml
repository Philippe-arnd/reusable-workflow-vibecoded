name: 📏 Update Bundle Baseline

on:
  push:
    branches: [main]
    # Only trigger when client code or deps actually changed
    paths:
      - 'client/src/**'
      - 'client/public/**'
      - 'client/package-lock.json'
      - 'client/package.json'
      - 'client/vite.config.*'

jobs:
  update-baseline:
    uses: Philippe-arnd/reusable-workflow-vibecoded/.github/workflows/reusable-update-bundle-baseline.yml@main
    secrets: inherit
    with:
      node-version: '24.13.1'
      install-command: npm ci --prefer-offline --no-audit
      cache-dependency-path: client/package-lock.json
      build-command: npm run build
      bundle-client-dir: client
      # This file contains the bundle-js-baseline-kb / bundle-css-baseline-kb values to update
      workflow-file: .github/workflows/security-performance.yml
